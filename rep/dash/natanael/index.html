<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Life B | Leads — Natanael</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple:  #704B9B;
      --magenta: #E92085;
      --green:   #22C35D;
      --red:     #dc2626;
      --orange:  #f59e0b;
      --text:    #221B32;
      --muted:   #6b6484;
      --bg:      #f4f2f8;
      --card:    #ffffff;
      --border:  #e8e4f0;
      --font:    'Montserrat', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* LOADING BAR */
    #loading-bar {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--purple), var(--magenta));
      z-index: 9999; transition: width .2s, opacity .4s; pointer-events: none;
    }
    #loading-bar.running { animation: loadbar 1.8s ease-in-out infinite; }
    @keyframes loadbar {
      0%   { width: 0%;   opacity: 1; }
      60%  { width: 80%;  opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(112,75,155,.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .h-brand { display: flex; align-items: center; gap: 12px; }
    .h-logo  { height: 30px; width: auto; }
    .h-sep   { width: 1px; height: 26px; background: rgba(112,75,155,.2); }
    .h-rep   { font-size: 13px; font-weight: 800; color: var(--purple); letter-spacing: .4px; text-transform: uppercase; }
    .h-right { display: flex; align-items: center; gap: 10px; }
    #refresh-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); opacity: .35; flex-shrink: 0;
    }
    #refresh-dot.flash { animation: dot-flash 1.4s ease forwards; }
    @keyframes dot-flash {
      0%   { opacity: .35; transform: scale(1);   }
      18%  { opacity: 1;   transform: scale(1.8); box-shadow: 0 0 8px rgba(34,195,93,.6); }
      100% { opacity: .35; transform: scale(1);   }
    }
    #last-sync { font-size: 11px; font-weight: 600; color: var(--muted); }

    /* MAIN */
    main { padding: 16px 16px 32px; max-width: 680px; margin: 0 auto; }

    /* SUMMARY STRIP */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .sum-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .sum-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .4px; color: var(--muted); margin-bottom: 4px;
    }
    .sum-val {
      font-size: 22px; font-weight: 800; line-height: 1;
    }
    .sum-card.s-ag   { border-top: 3px solid #dc2626; }
    .sum-card.s-cont { border-top: 3px solid #d97706; }
    .sum-card.s-neg  { border-top: 3px solid #16a34a; }
    .sum-card.s-tot  { border-top: 3px solid var(--purple); }
    .sum-card.s-ag   .sum-val { color: #dc2626; }
    .sum-card.s-cont .sum-val { color: #d97706; }
    .sum-card.s-neg  .sum-val { color: #16a34a; }
    .sum-card.s-tot  .sum-val { color: var(--purple); }

    /* ERROR BANNER */
    #error-banner {
      display: none;
      background: #fff0f5; border: 1px solid #ffc0d8;
      border-radius: 10px; padding: 12px 16px;
      color: #b0134a; font-size: 13px; margin-bottom: 16px;
    }

    /* LEAD CARD */
    .lead-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .lead-card.ag   { border-left: 4px solid #dc2626; }
    .lead-card.cont { border-left: 4px solid #d97706; }
    .lead-card.neg  { border-left: 4px solid #16a34a; }

    .lc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .lc-empresa {
      font-size: 15px; font-weight: 800; color: var(--text);
      line-height: 1.2; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .lc-pot {
      font-size: 13px; font-weight: 700; color: var(--purple);
      white-space: nowrap; flex-shrink: 0;
    }

    .lc-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .lc-tag {
      font-size: 10px; font-weight: 600; color: var(--muted);
      background: var(--bg); border-radius: 6px; padding: 3px 8px;
    }

    /* STATUS SELECT */
    .lc-status-wrap { position: relative; }
    .lc-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      padding: 10px 36px 10px 14px;
      border-radius: 10px;
      border: 2px solid var(--border);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
      background-color: var(--bg);
      color: var(--text);
      outline: none;
    }
    .lc-select:focus { border-color: var(--purple); }
    .lc-select.s-ag   { background: rgba(220,38,38,.07);  border-color: rgba(220,38,38,.4);  color: #b91c1c; }
    .lc-select.s-cont { background: rgba(217,119,6,.07);  border-color: rgba(217,119,6,.4);  color: #92400e; }
    .lc-select.s-neg  { background: rgba(22,163,74,.07);  border-color: rgba(22,163,74,.4);  color: #15803d; }
    .lc-select.s-fech { background: rgba(22,163,74,.12);  border-color: rgba(22,163,74,.5);  color: #15803d; }
    .lc-select.s-perd { background: rgba(220,38,38,.07);  border-color: rgba(220,38,38,.3);  color: #991b1b; }
    .lc-select.saving { opacity: .6; pointer-events: none; }

    /* chevron do select */
    .lc-status-wrap::after {
      content: '▾';
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 13px; color: var(--muted); pointer-events: none;
    }

    /* FEEDBACK */
    .lc-feedback {
      font-size: 11px; font-weight: 600; margin-top: 6px;
      min-height: 16px; transition: opacity .3s;
    }
    .lc-feedback.ok  { color: #16a34a; }
    .lc-feedback.err { color: #dc2626; }

    /* OBS */
    .lc-obs {
      font-size: 11px; color: var(--muted); margin-top: 8px;
      padding: 6px 10px; background: var(--bg);
      border-radius: 8px; line-height: 1.4;
      display: none;
    }
    .lc-obs.visible { display: block; }

    /* ESTADO VAZIO */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--muted); font-size: 14px;
    }
    .empty-state strong { display: block; font-size: 20px; margin-bottom: 8px; color: var(--purple); }

    /* SKELETON */
    @keyframes skel-shine { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
    .skel {
      background: linear-gradient(90deg,#e8e4f0 25%,#d0cae6 50%,#e8e4f0 75%);
      background-size: 200% 100%;
      animation: skel-shine 1.4s linear infinite;
      border-radius: 6px;
    }
    .skel-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 10px;
    }
    .skel-line { height: 14px; margin-bottom: 8px; }
    .skel-line.w80 { width: 80%; }
    .skel-line.w50 { width: 50%; }
    .skel-line.w30 { width: 30%; }
    .skel-btn  { height: 42px; border-radius: 10px; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1f1635; color: #fff;
      padding: 10px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; white-space: nowrap; z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* DESKTOP */
    @media (min-width: 640px) {
      main { padding: 24px 24px 40px; }
      .summary-strip { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .sum-val { font-size: 26px; }
      .lc-empresa { font-size: 16px; }
      .lc-select  { font-size: 14px; padding: 11px 36px 11px 14px; }
    }
  </style>
</head>
<body>

<div id="loading-bar"></div>

<header>
  <div class="h-brand">
    <img class="h-logo" src="https://d2xsxph8kpxj0f.cloudfront.net/logo-lifeb-color.png" alt="Life B" onerror="this.style.display='none'">
    <div class="h-sep"></div>
    <span class="h-rep">Natanael</span>
  </div>
  <div class="h-right">
    <span id="last-sync"></span>
    <div id="refresh-dot"></div>
  </div>
</header>

<main>
  <div id="error-banner"></div>

  <div class="summary-strip">
    <div class="sum-card s-ag">
      <div class="sum-label">Aguardando</div>
      <div class="sum-val" id="sum-ag">—</div>
    </div>
    <div class="sum-card s-cont">
      <div class="sum-label">Em Contato</div>
      <div class="sum-val" id="sum-cont">—</div>
    </div>
    <div class="sum-card s-neg">
      <div class="sum-label">Negociando</div>
      <div class="sum-val" id="sum-neg">—</div>
    </div>
    <div class="sum-card s-tot">
      <div class="sum-label">Total Ativo</div>
      <div class="sum-val" id="sum-tot">—</div>
    </div>
  </div>

  <div id="leads-list"></div>
</main>

<div id="toast"></div>

<script>
const PROXY_URL  = 'https://script.google.com/macros/s/AKfycbyq9KJgWTRoALEEVf8Pu_I82GT0-tTK5yXNg-RsYHj4ywK6Grg9z_jG1-IcTW3LMXfNBg/exec';
const REP_NAME   = 'NATANAEL';    // IRAMAR ou NATANAEL — hardcoded por arquivo
const REP_TOKEN  = 'c4e09a0994b803ab35d43f3c';
const POLL_MS    = 60_000;

const STATUS_LIST = [
  'Aguardando contato',
  'Em contato',
  'Em negociação',
  'Fechado',
  'Perdido',
];

// ── UTILITÁRIOS ──────────────────────────────────────────────
const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const cur = v => 'R$ ' + (+(v||0)).toLocaleString('pt-BR', {minimumFractionDigits:0,maximumFractionDigits:0});

function toTitleCase(s) {
  if (!s) return s;
  const lower = new Set(['de','do','da','dos','das','e','em','com','a','o','as','os','no','na','nos','nas','ao','aos','por']);
  return String(s).toLowerCase().split(' ').map((w,i) =>
    (i > 0 && lower.has(w)) ? w : w.charAt(0).toUpperCase() + w.slice(1)
  ).join(' ');
}

function fmtData(d) {
  if (!d) return '';
  const p = d.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0].slice(2)}` : d;
}

function statusClass(s) {
  if (s === 'Aguardando contato') return 's-ag';
  if (s === 'Em contato')         return 's-cont';
  if (s === 'Em negociação')      return 's-neg';
  if (s === 'Fechado')            return 's-fech';
  if (s === 'Perdido')            return 's-perd';
  return '';
}

function cardBorderClass(s) {
  if (s === 'Aguardando contato') return 'ag';
  if (s === 'Em contato')         return 'cont';
  if (s === 'Em negociação')      return 'neg';
  return '';
}

// ── LOADING ──────────────────────────────────────────────────
let _inFlight = 0;
function loadStart() {
  if (++_inFlight !== 1) return;
  const b = document.getElementById('loading-bar');
  if (b) { b.style.opacity='1'; b.classList.add('running'); }
}
function loadEnd() {
  _inFlight = Math.max(0, _inFlight - 1);
  if (_inFlight > 0) return;
  const b = document.getElementById('loading-bar');
  if (b) { b.classList.remove('running'); b.style.opacity='0'; }
}

// ── TOAST ────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ── REFRESH DOT ──────────────────────────────────────────────
function flashDot() {
  const dot = document.getElementById('refresh-dot');
  if (!dot) return;
  dot.classList.remove('flash');
  void dot.offsetWidth;
  dot.classList.add('flash');
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = document.getElementById('last-sync');
  if (s) s.textContent = `atualizado ${h}:${m}`;
}

// ── SKELETON ─────────────────────────────────────────────────
function showSkeletons(n) {
  const list = document.getElementById('leads-list');
  if (!list) return;
  list.innerHTML = Array.from({length: n}, () => `
    <div class="skel-card">
      <div class="skel skel-line w80"></div>
      <div class="skel skel-line w50"></div>
      <div class="skel skel-btn"></div>
    </div>`).join('');
}

// ── RENDER ───────────────────────────────────────────────────
let _leads = [];

function renderLeads(leads) {
  _leads = leads;
  const list = document.getElementById('leads-list');
  if (!list) return;

  const myLeads = leads
    .filter(l => (l.rep || '').toUpperCase() === REP_NAME)
    .sort((a, b) => {
      const pa = a.status === 'Aguardando contato' ? 0 : 1;
      const pb = b.status === 'Aguardando contato' ? 0 : 1;
      if (pa !== pb) return pa - pb;
      return (a.data || '').localeCompare(b.data || '');
    });

  // Badges summary
  document.getElementById('sum-ag').textContent   = myLeads.filter(l => l.status === 'Aguardando contato').length;
  document.getElementById('sum-cont').textContent = myLeads.filter(l => l.status === 'Em contato').length;
  document.getElementById('sum-neg').textContent  = myLeads.filter(l => l.status === 'Em negociação').length;
  document.getElementById('sum-tot').textContent  = myLeads.length;

  if (!myLeads.length) {
    list.innerHTML = `<div class="empty-state"><strong>Tudo em dia!</strong>Nenhum lead ativo no momento.</div>`;
    return;
  }

  list.innerHTML = myLeads.map(l => {
    const empresa  = esc(toTitleCase(l.empresa || l.nome) || '—');
    const cidadeUF = [toTitleCase(l.cidade), l.estado].filter(v => v && v.trim()).join(' · ');
    const sClass   = statusClass(l.status);
    const bClass   = cardBorderClass(l.status);
    const options  = STATUS_LIST.map(s =>
      `<option value="${esc(s)}" ${s === l.status ? 'selected' : ''}>${esc(s)}</option>`
    ).join('');
    const pot = l.pot > 0 ? cur(l.pot) : '';

    return `
    <div class="lead-card ${bClass}" data-row="${l.row}">
      <div class="lc-top">
        <div class="lc-empresa" title="${empresa}">${empresa}</div>
        ${pot ? `<div class="lc-pot">${pot}</div>` : ''}
      </div>
      <div class="lc-meta">
        ${cidadeUF ? `<span class="lc-tag">📍 ${esc(cidadeUF)}</span>` : ''}
        ${l.data    ? `<span class="lc-tag">📅 ${esc(fmtData(l.data))}</span>` : ''}
        ${l.segmento ? `<span class="lc-tag">${esc(toTitleCase(l.segmento))}</span>` : ''}
      </div>
      <div class="lc-status-wrap">
        <select class="lc-select ${sClass}" data-row="${l.row}" data-original="${esc(l.status)}">
          ${options}
        </select>
      </div>
      <div class="lc-feedback" id="fb-${l.row}"></div>
      ${l.obs ? `<div class="lc-obs visible">💬 ${esc(l.obs)}</div>` : ''}
    </div>`;
  }).join('');

  // Bind change events
  list.querySelectorAll('.lc-select').forEach(sel => {
    sel.addEventListener('change', onStatusChange);
  });
}

// ── UPDATE STATUS ────────────────────────────────────────────
async function onStatusChange(e) {
  const sel    = e.target;
  const row    = parseInt(sel.dataset.row, 10);
  const valor  = sel.value;
  const fbEl   = document.getElementById(`fb-${row}`);

  sel.classList.add('saving');
  if (fbEl) { fbEl.textContent = 'Salvando…'; fbEl.className = 'lc-feedback'; }

  try {
    const res = await fetch(PROXY_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        token: REP_TOKEN,
        row:   row,
        rep:   REP_NAME,
        campo: 'STATUS_VENDEDOR',
        valor: valor,
      }),
    });

    const data = await res.json();

    if (data.ok) {
      // Atualiza classe do select e do card visualmente
      sel.className = `lc-select ${statusClass(valor)}`;
      sel.dataset.original = valor;
      const card = sel.closest('.lead-card');
      if (card) {
        card.className = `lead-card ${cardBorderClass(valor)}`;
      }
      if (fbEl) {
        fbEl.textContent = '✓ Salvo';
        fbEl.className = 'lc-feedback ok';
        setTimeout(() => { if (fbEl) fbEl.textContent = ''; }, 2500);
      }
      showToast('Status atualizado ✓');
    } else {
      throw new Error(data.error || 'Erro desconhecido');
    }
  } catch (err) {
    // Reverte o select para o valor original
    sel.value = sel.dataset.original;
    sel.className = `lc-select ${statusClass(sel.dataset.original)}`;
    if (fbEl) {
      fbEl.textContent = '✗ Não foi possível salvar. Tente novamente.';
      fbEl.className = 'lc-feedback err';
      setTimeout(() => { if (fbEl) fbEl.textContent = ''; }, 4000);
    }
    showToast('Erro ao salvar — tente novamente');
  } finally {
    sel.classList.remove('saving');
  }
}

// ── FETCH & POLL ─────────────────────────────────────────────
let _isLoading = false;
let _firstLoad = true;

async function loadData() {
  if (_isLoading) return;
  _isLoading = true;
  loadStart();
  try {
    if (_firstLoad) showSkeletons(3);
    const res  = await fetch(PROXY_URL + '?action=active');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderLeads(data.leads || []);
    flashDot();
    _firstLoad = false;
    const errEl = document.getElementById('error-banner');
    if (errEl) errEl.style.display = 'none';
  } catch (err) {
    const errEl = document.getElementById('error-banner');
    if (errEl) {
      errEl.textContent = 'Não foi possível carregar os dados. Verifique sua conexão.';
      errEl.style.display = 'block';
    }
    if (_firstLoad) {
      const list = document.getElementById('leads-list');
      if (list) list.innerHTML = '';
    }
  } finally {
    _isLoading = false;
    loadEnd();
  }
}

window.addEventListener('load', () => {
  loadData();
  setInterval(loadData, POLL_MS);
});
</script>
</body>
</html>
