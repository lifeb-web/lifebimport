            <div class="lc-pot-input-wrap" id="pot-input-wrap-${l.row}">
              <div class="lc-pot-pfx-wrap">
                <input class="lc-pot-input" id="pot-input-${l.row}" type="text" inputmode="decimal"
                  value="${l.pot > 0 ? l.pot : ''}" placeholder="0,00" onkeydown="potKeyDown(event,${l.row})" oninput="potPreview(this,${l.row})">
              </div>
              <div class="lc-pot-preview" id="pot-preview-${l.row}"></div>
              <div class="lc-pot-actions">
                <button class="lc-pot-cancel" onclick="cancelPotEdit(${l.row})">Cancelar</button>
                <button class="lc-pot-save"   onclick="savePot(${l.row})">OK</button>
              </div>
            </div>
          </div>
        </div>
        ${subtitulo ? `<div class="lc-nome">${esc(subtitulo)}</div>` : ''}
        <div class="lc-meta">
          ${cidadeUF ? `<span class="lc-tag">📍 ${esc(cidadeUF)}</span>` : ''}
          ${l.data   ? `<span class="lc-tag">📅 ${esc(fmtData(l.data))}</span>` : ''}
          <div class="lc-meta-btns">
            ${hasContact ? `<button class="lc-icon-btn contact" onclick="toggleContact(this,${l.row})" title="Dados do contato" aria-expanded="false">${SVG_PERSON}</button>` : ''}
            ${wa         ? `<button class="lc-icon-btn wa"   data-url="https://wa.me/${wa}" onclick="openLinkConfirm(this)" title="WhatsApp">${SVG_WA}</button>` : ''}
            ${mapLink    ? `<button class="lc-icon-btn maps" data-url="${esc(mapLink)}" onclick="openLinkConfirm(this)" title="Ver no Google Maps">${SVG_PIN}</button>` : ''}
          </div>
        </div>
        <div class="lc-contact-panel" id="cp-${l.row}">
          <div id="lcp-rows-${l.row}">${cpRows.join('')}</div>
          ${wa ? `<div class="lcp-wa-overlay" id="lcp-wac-${l.row}">
            <div class="lcp-wac-icon">💬</div>
            <div class="lcp-wac-msg" id="lcp-wac-msg-${l.row}"></div>
            <div class="lcp-wac-num" id="lcp-wac-num-${l.row}"></div>
            <div class="lcp-wac-btns">
              <button class="lcp-wac-cancel" onclick="closeContactWa(${l.row})">Cancelar</button>
              <button class="lcp-wac-open"   onclick="doContactWa(${l.row})">Abrir WhatsApp</button>
            </div>
          </div>` : ''}
        </div>
        <div class="lc-status-wrap">
          <div class="lc-sel-wrap" id="selwrap-${l.row}">
            <select class="lc-select ${sClass}" data-row="${l.row}" data-original="${esc(l.status)}" aria-label="Status do lead">
              ${options}
            </select>
          </div>
          <div class="lc-last-updated" id="ts-${l.row}">${getLeadTs(l.row, l.data, l.ts_vend)}</div>
          <div class="lc-confirm" id="conf-${l.row}">
            <div class="lc-confirm-icon" id="conf-icon-${l.row}">📋</div>
            <div class="lc-confirm-msg">Mudar para <strong id="conf-status-${l.row}"></strong>?</div>
            <div class="lc-confirm-sub" id="conf-sub-${l.row}">Lead vai ao final da fila.</div>
            <div class="lc-confirm-actions">
              <button class="lc-confirm-cancel" onclick="cancelStatusChange(${l.row})">Cancelar</button>
              <button class="lc-confirm-ok"     onclick="confirmStatusChange(${l.row})">Confirmar</button>
            </div>
          </div>
        </div>
        <div class="lc-feedback" id="fb-${l.row}"></div>
        <div class="lc-status-prompt" id="sp-${l.row}">
          <div class="lc-sp-label"></div>
          <div class="lc-sp-row">
            <div class="lc-sp-pfx-wrap" id="sp-pfx-wrap-${l.row}">
              <input class="lc-sp-input" id="sp-input-${l.row}" type="text" inputmode="decimal" placeholder="0,00" onkeydown="spKeyDown(event,${l.row})" oninput="spPreview(this,${l.row})">
            </div>
            <div class="lc-sp-date-wrap" id="sp-date-wrap-${l.row}" style="display:none">
              <input class="lc-sp-input" id="sp-date-${l.row}" type="date" onkeydown="spKeyDown(event,${l.row})">
            </div>
          </div>
          <div class="lc-sp-val-preview" id="sp-preview-${l.row}"></div>
          <select class="lc-sp-input lc-sp-sel" id="sp-sel-${l.row}" style="display:none">
            <option value="">Selecione o motivo…</option>
            <option>Sem interesse</option>
            <option>Sem retorno</option>
            <option>Restrição de pagamento</option>
            <option>Já possui fornecedor</option>
            <option>Fora do perfil</option>
            <option>Outro</option>
          </select>
          <div class="lc-sp-footer">
            <button class="lc-sp-skip" id="sp-skip-${l.row}" style="display:none" onclick="skipPotPrompt(${l.row})">Pular</button>
            <button class="lc-sp-save" onclick="saveStatusExtra(${l.row})">Salvar</button>
          </div>
        </div>
        <div class="lc-confirm" id="lc-${l.row}" style="margin-top:6px;">
          <div class="lc-confirm-icon" id="lc-icon-${l.row}">🔗</div>
          <div class="lc-confirm-msg">Abrir <strong id="lc-lbl-${l.row}"></strong>?</div>
          <div class="lc-confirm-actions">
            <button class="lc-confirm-cancel" onclick="closeLinkConfirm('lc-${l.row}')">Cancelar</button>
            <button class="lc-confirm-ok"     onclick="doConfirmLink('lc-${l.row}')">Abrir</button>
          </div>
        </div>
      </div>
      <button class="lc-toggle" onclick="toggleExpand(this)" aria-expanded="false">
        <span class="tt">mais</span>&nbsp;<span class="ti">▾</span>
      </button>
      <div class="lc-expand">
        ${l.obs_sdr ? `<div class="lc-obs-sdr"><div class="lc-obs-sdr-label">Observação do SDR</div><div class="lc-obs-sdr-text">${esc(l.obs_sdr)}</div></div>` : ''}
        <hr class="lc-divider">
        <div class="lc-obs-label">Minha observação</div>
        <div class="lc-obs-rep" id="obsr-${l.row}" data-saved="${esc(l.obs||'')}">
          <div class="obsr-view">${obsViewHtml}</div>
          <div class="obsr-edit-wrap" id="obsr-edit-${l.row}">
            <div class="obs-conclude-banner">📝 Registre uma observação antes de concluir</div>
            <textarea class="lc-obs-textarea" id="obs-${l.row}" maxlength="1000"
              placeholder="Escreva sua observação sobre este lead…">${esc(l.obs||'')}</textarea>
            <div class="lc-obs-footer">
              <span class="lc-obs-fb" id="obs-fb-${l.row}"></span>
              <button class="obsr-cancel-btn"  id="obs-cancel-${l.row}"   onclick="cancelObsEdit(${l.row})">Cancelar</button>
              <button class="lc-obs-clear"    id="obs-clear-${l.row}"   onclick="clearObs(${l.row})">Limpar</button>
              <button class="lc-obs-conclude" id="obs-conclude-${l.row}" onclick="concludeCard(${l.row})">Pular →</button>
              <button class="lc-obs-save"     id="obs-save-${l.row}"     onclick="saveObs(${l.row})">Salvar</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  // botões ver mais / ver menos
  if (wrap) {
    const filtered2 = _activeFilter
      ? _allLeads.filter(l => l.status === _activeFilter && _matchesSearch(l))
      : _allLeads.filter(l => _matchesSearch(l));
    const hasMore2 = !searchActive && _visibleCount < filtered2.length;
    const hasLess2 = !searchActive && _visibleCount > LIMIT;
    wrap.innerHTML = (hasMore2 || hasLess2) ? `<div class="show-more-row">
      ${hasLess2 ? `<button class="show-less-btn" onclick="showLess()">▲ Ver menos</button>` : ''}
      ${hasMore2 ? `<button class="show-more-btn" onclick="showMore()">Ver mais ▾</button>` : ''}
    </div>` : '';
  }

  // bind events
  list.querySelectorAll('.lc-select').forEach(sel => sel.addEventListener('change', onStatusChange));

  // restore states
  expandedRows.forEach(row => {
    const card = list.querySelector(`.lead-card[data-row="${row}"]`);
    if (!card) return;
    card.classList.add('expanded');
    const btn = card.querySelector('.lc-toggle');
    if (btn) { btn.querySelector('.tt').textContent='menos'; btn.setAttribute('aria-expanded','true'); }
    const ta = document.getElementById('obs-' + row);
    if (ta && obsDrafts[row] !== undefined) ta.value = obsDrafts[row];
  });
  contactOpen.forEach(row => {
    const cp  = document.getElementById('cp-' + row);
    const btn = list.querySelector(`.lead-card[data-row="${row}"] .lc-icon-btn.contact`);
    if (cp)  cp.style.display = 'block';
    if (btn) { btn.classList.add('active'); btn.setAttribute('aria-expanded','true'); }
  });

  // highlight recently moved card
  if (highlightRow) {
    const moved = list.querySelector(`.lead-card[data-row="${highlightRow}"]`);
    if (moved) {
      moved.classList.add('just-placed');
      moved.addEventListener('animationend', () => moved.classList.remove('just-placed'), { once:true });
    }
  }

  applyFilter();
}

// ── HISTÓRICO ─────────────────────────────────────────────────
let _history    = null;
let _histLoaded = false;
let _histPage   = 1;
let _histTab    = null; // null | 'fechados' | 'perdidos'
const HIST_PAGE_SIZE = 5;

function collapseHistorico() {
  const sec = document.getElementById('historico-section');
  if (!sec || !sec.classList.contains('open')) return;
  sec.classList.remove('open');
  const btn = sec.querySelector('.hist-header');
  if (btn) btn.setAttribute('aria-expanded', 'false');
  _histTab = null; _histPage = 1;
  _teardownHistObserver();
}

function toggleHistorico() {
  const section = document.getElementById('historico-section');
  if (!section) return;
  const opening = !section.classList.contains('open');
  section.classList.toggle('open');
  const btn = section.querySelector('.hist-header');
  if (btn) btn.setAttribute('aria-expanded', opening);
  if (opening) {
    if (!_histLoaded) loadHistorico();
    else renderHistorico();
    _setupHistAutoCollapse();
  } else {
    _teardownHistObserver();
    _histTab = null; _histPage = 1;
  }
}
function _teardownHistObserver() {
  if (window._histObserver) { window._histObserver.disconnect(); window._histObserver = null; }
  if (window._histCollapseTimer) { clearTimeout(window._histCollapseTimer); window._histCollapseTimer = null; }
}
function _setupHistAutoCollapse() {
  _teardownHistObserver();
  const leadsList = document.getElementById('leads-list');
  if (!leadsList) return;
  let wasHidden = false;
  window._histObserver = new IntersectionObserver(function(entries) {
    const entry = entries[0];
    if (!entry.isIntersecting) {
      wasHidden = true;
      if (window._histCollapseTimer) { clearTimeout(window._histCollapseTimer); window._histCollapseTimer = null; }
    } else if (wasHidden) {
      window._histCollapseTimer = setTimeout(function() {
        collapseHistorico();
        _teardownHistObserver();
      }, 3000);
    }
  }, { threshold: 0.6 });
  window._histObserver.observe(leadsList);
}

async function loadHistorico() {
  const body = document.getElementById('hist-body');
  if (!body) return;
  body.innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px;font-weight:600">Carregando…</div>`;
  try {
    const res  = await fetch(PROXY_URL + '?action=rep_history&rep=' + REP_NAME + '&token=' + REP_TOKEN);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    _history    = data.history || [];
    _histLoaded = true;
    renderHistorico();
  } catch(err) {
    if (body) body.innerHTML = `<div style="padding:16px;color:#b0134a;font-size:12px">Não foi possível carregar o histórico.</div>`;
  }
}

function _histCardHtml(l) {
  const nomeRaw    = toTitleCase(l.nome||'');
  const nomeEmp    = toTitleCase(l.empresa||'');
  const titulo     = esc(nomeEmp || nomeRaw || '—');
  const subtitulo  = nomeEmp && nomeRaw && nomeRaw.toLowerCase() !== nomeEmp.toLowerCase() ? nomeRaw : '';
  const cidadeUF   = [toTitleCase(l.cidade),(l.estado||'').toUpperCase()].filter(v=>v&&v.trim()).join(' · ');
  const bClass     = l.status==='Fechado' ? 'fech' : 'perd';
  const badge      = l.status==='Fechado' ? 'b-fech' : 'b-perd';
  const dataMeta   = l.data_f ? '📅 '+fmtData(l.data_f) : (l.data ? '📅 '+fmtData(l.data) : '');
  const valorMeta  = l.status==='Fechado' && (l.valor_fech>0||l.valor>0) ? cur(l.valor_fech||l.valor) : '';
  const motivoMeta = l.status==='Perdido' && (l.motivo_perd||l.motivo) ? (l.motivo_perd||l.motivo) : '';
  const wa         = fmtWA(l.whatsapp);
  return `<div class="hist-card ${bClass}" data-row="${l.row}">
    <div class="hist-top">
      <div class="hist-top-left">
        <div class="hist-empresa">${titulo}</div>
        ${subtitulo ? `<div class="hist-nome">${esc(subtitulo)}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        ${wa ? `<button class="lc-icon-btn wa" data-url="https://wa.me/${wa}" onclick="openLinkConfirm(this)" title="WhatsApp" style="width:26px;height:26px;border:none;">${SVG_WA}</button>` : ''}
        <span class="hist-badge ${badge}">${esc(l.status)}</span>
      </div>
    </div>
    <div class="hist-meta">
      ${cidadeUF   ? `<span class="lc-tag">📍 ${esc(cidadeUF)}</span>` : ''}
      ${dataMeta   ? `<span class="lc-tag">${esc(dataMeta)}</span>` : ''}
      ${valorMeta  ? `<span class="lc-tag">💰 ${esc(valorMeta)}</span>` : ''}
      ${motivoMeta ? `<span class="lc-tag">❌ ${esc(motivoMeta)}</span>` : ''}
    </div>
    ${wa ? `<div class="lc-confirm" id="hlc-${l.row}" style="margin-top:8px;">
      <div class="lc-confirm-icon">💬</div>
      <div class="lc-confirm-msg">Abrir <strong>WhatsApp</strong>?</div>
      <div class="lc-confirm-actions">
        <button class="lc-confirm-cancel" onclick="closeLinkConfirm('hlc-${l.row}')">Cancelar</button>
        <button class="lc-confirm-ok"     onclick="doConfirmLink('hlc-${l.row}')">Abrir</button>
      </div>
    </div>` : ''}
  </div>`;
}
function setHistTab(tab) {
  _histTab = tab; _histPage = 1;
  renderHistorico();
}
function renderHistorico() {
  const body   = document.getElementById('hist-body');
  const counts = document.getElementById('hist-counts');
  const sec    = document.getElementById('historico-section');
  if (!body) return;
  const h     = _history || [];
  const nFech = h.filter(l=>l.status==='Fechado').length;
  const nPerd = h.filter(l=>l.status==='Perdido').length;

  // modo busca: mostra todos os matches (fechados e perdidos juntos), abre seção
  if (_searchQuery.length === 4) {
    const matches = h.filter(_matchesSearch);
    if (counts) counts.textContent = matches.length
      ? matches.length + ' resultado' + (matches.length !== 1 ? 's' : '') + ' no histórico'
      : 'nenhum no histórico';
    if (matches.length) {
      if (sec) sec.classList.add('open');
      body.innerHTML = matches.map(_histCardHtml).join('');
    } else {
      body.innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">Nenhum resultado no histórico.</div>`;
    }
    return;
  }

  if (counts) counts.textContent = nFech+' fechado'+(nFech!==1?'s':'')+(nPerd?' · '+nPerd+' perdido'+(nPerd!==1?'s':''):'');
  if (!h.length) { body.innerHTML=`<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">Nenhum histórico ainda.</div>`; return; }
  const semWA = h.filter(l => !fmtWA(l.whatsapp)).length;
  const diagHtml = semWA === h.length
    ? `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;color:#b45309;margin-bottom:8px;">⚠️ WhatsApp não está chegando nesta lista (${h.length}/${h.length} sem WA). Verifique se o proxy foi reimplantado no Apps Script.</div>`
    : '';
  // No tab selected: show two category cards
  if (!_histTab) {
    body.innerHTML = diagHtml + `<div class="hist-tab-cards">
      <button class="hist-tab-card fech" onclick="setHistTab('fechados')">
        <span class="hist-tab-icon">✅</span>
        <span class="hist-tab-label">Fechados</span>
        <span class="hist-tab-count">${nFech}</span>
      </button>
      <button class="hist-tab-card perd" onclick="setHistTab('perdidos')">
        <span class="hist-tab-icon">❌</span>
        <span class="hist-tab-label">Perdidos</span>
        <span class="hist-tab-count">${nPerd}</span>
      </button>
    </div>`;
    return;
  }
  // Tab selected: filter and paginate
  const filtered = h.filter(l => _histTab === 'fechados' ? l.status==='Fechado' : l.status==='Perdido')
    .sort((a, b) => {
      const da = a.data_f || '';
      const db = b.data_f || '';
      if (da && db) return db.localeCompare(da);
      if (da) return -1;
      if (db) return 1;
      return (b.row || 0) - (a.row || 0);
    });
  const visible  = filtered.slice(0, _histPage * HIST_PAGE_SIZE);
  const hasMore  = filtered.length > visible.length;
  const backBtn  = `<button class="hist-back-btn" onclick="setHistTab(null)">← Voltar</button>`;
  const cards    = visible.map(_histCardHtml).join('');
  const pagination = (hasMore || _histPage > 1) ? `<div class="hist-pagination">
    ${_histPage > 1 ? `<button class="hist-pg-btn" onclick="histVerMenos()">▲ Ver menos</button>` : ''}
    ${hasMore       ? `<button class="hist-pg-btn" onclick="histVerMais()">Ver mais ▾</button>` : ''}
  </div>` : '';
  body.innerHTML = diagHtml + backBtn + cards + pagination;
}
function histVerMais() { _histPage++; renderHistorico(); }
function histVerMenos() {
  _histPage = 1; renderHistorico();
  const hdr = document.querySelector('.hist-header');
  if (hdr) hdr.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ── FETCH & POLL ──────────────────────────────────────────────
let _isLoading  = false;
let _firstLoad  = true;
let _retryCount = 0;
const MAX_RETRIES = 2;
const CACHE_KEY = 'lifeb_cache_IRAMAR';

async function loadData() {
  if (_isLoading) return;
  _isLoading = true;
  loadStart();
  try {
    if (_firstLoad) {
      // Show cached leads instantly before the API responds
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        // Validate rep matches — prevents showing another rep's leads from a stale/shared cache
        if (cached && cached.rep === REP_NAME && cached.leads && cached.leads.length) {
          _rawLeads  = cached.leads;
          _firstLoad = false;
          renderLeads(_rawLeads);
        } else {
          if (cached && cached.rep !== REP_NAME) localStorage.removeItem(CACHE_KEY);
          showSkeletons(3);
        }
      } catch(_) { showSkeletons(3); }
    }

    const res  = await fetch(PROXY_URL + '?action=active&rep=' + REP_NAME + '&token=' + REP_TOKEN);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const newLeads = data.leads || [];

    // Merge server timestamps into _tsMap (prefer whichever is more recent)
    newLeads.forEach(function(l) {
      if (l.ts_vend && l.ts_vend > (_tsMap[l.row] || 0)) _tsMap[l.row] = l.ts_vend;
    });
    try { localStorage.setItem(TS_KEY, JSON.stringify(_tsMap)); } catch(_) {}

    // Persist fresh data with rep tag to prevent cross-rep cache reads
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ rep: REP_NAME, leads: newLeads, ts: Date.now() })); } catch(_) {}

    // If a status prompt is visible, preserve that lead so it doesn't vanish mid-fill
    _rawLeads.forEach(existing => {
      if (!newLeads.find(nl => nl.row === existing.row)) {
        const prompt = document.getElementById('sp-' + existing.row);
        if (prompt && prompt.classList.contains('visible')) newLeads.push(existing);
      }
    });
    const hasPending = !!document.querySelector('.lc-status-prompt.visible, .lead-card.concluding');
    const changed    = _firstLoad || JSON.stringify(newLeads) !== JSON.stringify(_rawLeads);
    _rawLeads = newLeads;
    if (changed && !hasPending) renderLeads(_rawLeads);
    flashDot();
    _firstLoad  = false;
    _retryCount = 0;
    const err = document.getElementById('error-banner');
    if (err) err.style.display = 'none';
  } catch(e) {
    // Retry silently before surfacing any error
    if (_retryCount < MAX_RETRIES) {
      _retryCount++;
      _isLoading = false;
      loadEnd();
      setTimeout(loadData, 4000 * _retryCount);
      return;
    }
    _retryCount = 0;
    // Only show error banner when there is no data to display
    if (!_rawLeads.length) {
      const err = document.getElementById('error-banner');
      if (err) { err.textContent='Não foi possível carregar os dados. Verifique sua conexão.'; err.style.display='block'; }
      if (_firstLoad) { const l=document.getElementById('leads-list'); if(l) l.innerHTML=''; }
    }
    // When cached data is already on screen, fail silently — data stays visible
  } finally { _isLoading=false; loadEnd(); }
}

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  setInterval(loadData, POLL_MS);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { _retryCount = 0; loadData(); }
  });
  // Fechar histórico ao interagir com a área de leads (filtros, cards, etc.)
  // Guard: se o target foi removido do DOM pelo próprio onclick (ex: setHistTab re-renderiza body),
  // não colapsa — o usuário clicou dentro do histórico mesmo.
  document.querySelector('main').addEventListener('click', function(e) {
    if (!document.contains(e.target)) return;
    if (!e.target.closest('#historico-section')) collapseHistorico();
  });
});
</script>
