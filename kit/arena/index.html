<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life B · Playbook Comercial</title>

<style>
:root {
  --purple: #564B99;
  --purple-light: #7B6FC4;
  --magenta: #DA2F8A;
  --dark: #0B0A14;
  --dark2: #131220;
  --dark3: #1C1A2E;
  --card: #1A1828;
  --card2: #211E35;
  --light: #F2EEFF;
  --muted: #8A84B0;
  --border: rgba(86,75,153,0.2);
  --green: #22C55D;
  --amber: #F59E0B;
  --red: #EF4444;
  --grad: linear-gradient(135deg, #564B99 0%, #DA2F8A 100%);
  --grad2: linear-gradient(135deg, #DA2F8A 0%, #564B99 100%);
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  --display: 'Plus Jakarta Sans', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark);
  color: var(--light);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(11,10,20,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.header-logo svg { height: 26px; width: auto; display: block; }

.header-right { display: flex; align-items: center; gap: 8px; }

.kit-label {
  font-family: var(--display);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 4px 11px;
  border-radius: 20px;
}

.reset-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.18s;
}
.reset-btn:hover { border-color: var(--magenta); color: var(--magenta); }

/* ── NAV ── */
.nav-wrap { background: var(--dark2); border-bottom: 1px solid var(--border); }
.nav-scroll {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 10px 16px;
  -webkit-overflow-scrolling: touch;
}
.nav-scroll::-webkit-scrollbar { display: none; }

.nav-pill {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 13px;
  border-radius: 8px;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
  transition: all 0.18s;
  flex-shrink: 0;
  letter-spacing: 0.01em;
}
.nav-pill.active { background: var(--grad); border-color: transparent; color: white; }
.nav-pill:hover:not(.active) { border-color: var(--purple-light); color: var(--light); }

/* ── PROGRESS ── */
.progress-bar { height: 2px; background: var(--dark3); }
.progress-fill { height: 100%; background: var(--grad); transition: width 0.4s ease; }

/* ── MAIN ── */
main { max-width: 700px; margin: 0 auto; padding: 28px 20px calc(120px + env(safe-area-inset-bottom, 0px)); position: relative; z-index: 1; }

/* ── STEP PAGE ── */
.step-page { display: none; animation: fadeUp 0.3s ease; }
.step-page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── MODULE HEADER ── */
.mod-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 13px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 14px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.mod-eyebrow .num {
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-family: var(--display);
}
.mod-eyebrow .emoji { font-size: 1rem; }

.mod-title {
  font-family: var(--display);
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  line-height: 1.05;
  margin-bottom: 8px;
  letter-spacing: -0.03em;
}
.mod-subtitle {
  color: var(--muted);
  font-size: 0.92rem;
  line-height: 1.65;
  margin-bottom: 26px;
  font-weight: 400;
}

/* ── HERO QUOTE ── */
.hero-quote {
  background: linear-gradient(135deg, rgba(86,75,153,0.15), rgba(218,47,138,0.08));
  border: 1px solid rgba(86,75,153,0.3);
  border-left: 3px solid var(--magenta);
  border-radius: 0 12px 12px 0;
  padding: 18px 20px;
  margin-bottom: 22px;
}
.hero-quote .q-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--magenta);
  margin-bottom: 8px;
}
.hero-quote .q-text {
  font-family: var(--display);
  font-size: 1.05rem;
  line-height: 1.55;
  color: var(--light);
  font-weight: 600;
}
.hero-quote .q-author {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 8px;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 0.67rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--purple-light);
  margin: 24px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── PRINCIPLE CARDS ── */
.principle-grid { display: flex; flex-direction: column; gap: 8px; }
.principle-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: border-color 0.18s;
}
.principle-card:hover { border-color: rgba(86,75,153,0.4); }
.p-icon { font-size: 1.2rem; flex-shrink: 0; line-height: 1; margin-top: 2px; }
.p-title { font-family: var(--display); font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
.p-text { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }

/* ── CANVAS TABLE ── */
.canvas-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.canvas-table tr { border-bottom: 1px solid var(--border); }
.canvas-table tr:last-child { border-bottom: none; }
.canvas-table td { padding: 12px 14px; vertical-align: top; line-height: 1.6; }
.canvas-table td:first-child {
  font-family: var(--display);
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
  color: var(--magenta);
  width: 30%;
  padding-right: 10px;
}
.canvas-table td:last-child { color: #d4d0f0; }
.canvas-table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
}

/* ── CHECKLIST ── */
.checklist { display: flex; flex-direction: column; gap: 7px; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
}
.check-item:hover { border-color: rgba(86,75,153,0.45); background: var(--card2); }
.check-item.done { opacity: 0.55; border-color: rgba(86,75,153,0.35); }
.check-box {
  width: 20px; height: 20px;
  border: 2px solid rgba(86,75,153,0.35);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  margin-top: 1px;
}
.check-item.done .check-box { background: var(--grad); border-color: transparent; }
.check-item.done .check-box::after { content: '✓'; color: white; font-size: 0.7rem; font-weight: 800; }
.check-text { font-size: 0.88rem; line-height: 1.55; }
.check-text strong { color: var(--light); font-weight: 600; display: block; margin-bottom: 2px; }
.check-text small { color: var(--muted); font-size: 0.8rem; }

/* ── INFO/WARN CARDS ── */
.info-card {
  background: rgba(86,75,153,0.1);
  border: 1px solid rgba(86,75,153,0.22);
  border-radius: 9px;
  padding: 12px 16px;
  margin-bottom: 8px;
  font-size: 0.86rem;
  color: #c0bce8;
  line-height: 1.65;
}
.info-card strong { color: #a9a4e8; font-weight: 600; }

.warn-card {
  background: rgba(218,47,138,0.07);
  border: 1px solid rgba(218,47,138,0.22);
  border-radius: 9px;
  padding: 12px 16px;
  margin-bottom: 8px;
  font-size: 0.86rem;
  color: #eeaad0;
  line-height: 1.65;
}
.warn-card strong { color: #DA2F8A; }

.green-card {
  background: rgba(34,197,93,0.08);
  border: 1px solid rgba(34,197,93,0.2);
  border-radius: 9px;
  padding: 12px 16px;
  margin-bottom: 8px;
  font-size: 0.86rem;
  color: #a3e8bc;
  line-height: 1.65;
}
.green-card strong { color: var(--green); font-weight: 600; }

/* ── FUNNEL STEPS ── */
.funnel-steps { display: flex; flex-direction: column; gap: 0; }
.funnel-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.funnel-step:last-child { border-bottom: none; }
.step-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--grad);
  color: white;
  font-family: var(--display);
  font-size: 0.75rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.step-content { flex: 1; }
.step-title { font-weight: 700; font-size: 0.92rem; margin-bottom: 4px; }
.step-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.6; }
.step-meta {
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--magenta);
  margin-top: 5px;
  letter-spacing: 0.04em;
}

/* ── RFV TABLE ── */
.rfv-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.rfv-table th {
  background: var(--dark3);
  color: var(--muted);
  font-size: 0.67rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
}
.rfv-table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(86,75,153,0.1);
  vertical-align: top;
  line-height: 1.55;
}
.rfv-table tr:last-child td { border-bottom: none; }
.rfv-table tr:hover td { background: rgba(86,75,153,0.04); }
.table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }

.seg-badge {
  display: inline-flex;
  align-items: center;
  font-size: 0.73rem;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.seg-green { background: rgba(34,197,93,0.15); color: #86efac; border: 1px solid rgba(34,197,93,0.25); }
.seg-blue  { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
.seg-amber { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
.seg-red   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
.seg-gray  { background: rgba(107,114,128,0.15); color: #d1d5db; border: 1px solid rgba(107,114,128,0.25); }

/* ── COMBO TABLE ── */
.combo-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.combo-table th {
  background: var(--dark3);
  color: var(--muted);
  font-size: 0.67rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 700;
}
.combo-table td { padding: 10px 12px; border-bottom: 1px solid rgba(86,75,153,0.1); vertical-align: middle; }
.combo-table tr:last-child td { border-bottom: none; }
.combo-price { color: #86efac; font-weight: 700; }
.combo-parcel { color: var(--muted); font-size: 0.78rem; }
.combo-tag {
  background: rgba(86,75,153,0.2);
  border: 1px solid rgba(86,75,153,0.3);
  color: #a9a4e8;
  font-size: 0.67rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
}
.combo-tag.entry { background: rgba(218,47,138,0.12); border-color: rgba(218,47,138,0.28); color: #eeaad0; }

/* ── STACK CARDS ── */
.stack-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  gap: 14px;
  align-items: center;
}
.stack-icon { font-size: 1.5rem; flex-shrink: 0; }
.stack-name { font-family: var(--display); font-weight: 700; font-size: 0.92rem; margin-bottom: 2px; }
.stack-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
.stack-priority {
  margin-left: auto;
  font-size: 0.67rem;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.pri-1 { background: rgba(218,47,138,0.15); color: #eeaad0; border: 1px solid rgba(218,47,138,0.25); }
.pri-2 { background: rgba(86,75,153,0.2); color: #a9a4e8; border: 1px solid rgba(86,75,153,0.3); }
.pri-3 { background: rgba(107,114,128,0.15); color: #d1d5db; border: 1px solid rgba(107,114,128,0.25); }

/* ── CADENCE STEPS ── */
.cadence-step {
  display: flex;
  gap: 14px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.cadence-step:last-child { border-bottom: none; }
.cad-day {
  font-family: var(--display);
  font-size: 0.7rem;
  font-weight: 800;
  color: var(--magenta);
  width: 38px;
  flex-shrink: 0;
  padding-top: 2px;
  letter-spacing: 0.04em;
}
.cad-channel { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.cad-text { font-size: 0.85rem; line-height: 1.55; }
.cad-text strong { color: var(--light); font-weight: 600; }
.cad-text span { color: var(--muted); font-size: 0.8rem; }

/* ── NAV BUTTONS ── */
.nav-buttons {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(11,10,20,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 12px 20px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  z-index: 100;
}
.nav-btn {
  background: var(--dark3);
  border: 1px solid var(--border);
  color: var(--light);
  padding: 12px 20px;
  border-radius: 9px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.18s;
  flex: 1;
}
.nav-btn:hover:not(:disabled) { border-color: var(--purple); }
.nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.nav-btn.primary { background: var(--grad); border-color: transparent; color: white; }
.nav-btn.primary:hover { opacity: 0.88; }
.step-counter { font-size: 0.72rem; color: var(--muted); text-align: center; flex-shrink: 0; font-weight: 500; }
</style>
</head>

    emoji: '🛠️', label: 'Tecnologia', title: 'Stack de Tecnologia',
    subtitle: 'As ferramentas certas, na ordem certa, sem complexidade desnecessária.',
    content: `
      <div class="section-label">Stack recomendada</div>
      <div class="stack-card"><div class="stack-icon">📋</div><div><div class="stack-name">Agendor</div><div class="stack-desc">CRM do representante. Pipeline visual, histórico de clientes, base do RFV e régua de inativação.</div></div><div class="stack-priority pri-1">1ª prioridade</div></div>

      <div class="stack-card"><div class="stack-icon">🤖</div><div><div class="stack-name">PROSPCT.AI</div><div class="stack-desc">Geração e qualificação de leads para outbound. Quando a operação outbound estiver estruturada.</div></div><div class="stack-priority pri-3">3ª prioridade</div></div>
      <div class="stack-card"><div class="stack-icon">🧠</div><div><div class="stack-name">Station AI</div><div class="stack-desc">PSF, SPIN Selling e scripts gerados por IA. Acelera o que foi construído manualmente.</div></div><div class="stack-priority pri-3">Complementar</div></div>

      <div class="section-label">Fluxo integrado</div>
      <div class="funnel-steps">
        <div class="funnel-step"><div class="step-num">1</div><div class="step-content"><div class="step-title">Lead entra via Meta Ads</div><div class="step-desc">WhatsApp ou formulário da landing page.</div></div></div>
        <div class="funnel-step"><div class="step-num">2</div><div class="step-content"><div class="step-title">SDR aborda em até 5 minutos</div><div class="step-desc">GS Engage organiza a cadência e registra cada contato.</div></div></div>
        <div class="funnel-step"><div class="step-num">3</div><div class="step-content"><div class="step-title">Lead qualificado vai para o Agendor</div><div class="step-desc">Handoff automático. Rep recebe no pipeline já com briefing do SDR.</div></div></div>
        <div class="funnel-step"><div class="step-num">4</div><div class="step-content"><div class="step-title">Rep trabalha no Agendor</div><div class="step-desc">Atualiza status, registra pedido, monitora giro e recebe alertas de inativação.</div></div></div>
        <div class="funnel-step"><div class="step-num">5</div><div class="step-content"><div class="step-title">Gestor monitora em tempo real</div><div class="step-desc">Dashboard de performance por rep, produtividade, conversão, carteira ativa e alertas.</div></div></div>
      </div>

      <div class="info-card"><strong>Agente SDR (próxima fase):</strong> n8n + Gemini Flash qualifica o lead automaticamente, identifica GO ou DF e atribui ao Iramar ou Natanael via proxy. Speed to lead cai de 90h para menos de 5 minutos.</div>
    `
  }
];

let current = 0;
const STORAGE_KEY = 'lifeb-playbook-arena';

// ── PERSISTÊNCIA ─────────────────────────────────────────────────
function saveState() {
  const state = {};
  document.querySelectorAll('.check-item[data-key]').forEach(el => {
    state[el.dataset.key] = el.classList.contains('done') ? 1 : 0;
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
}

function restoreState() {
  let state = {};
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(_) {}
  document.querySelectorAll('.check-item[data-key]').forEach(el => {
    if (state[el.dataset.key]) el.classList.add('done');
  });
}

function assignKeys() {
  document.querySelectorAll('.step-page').forEach((page, si) => {
    page.querySelectorAll('.check-item').forEach((item, ci) => {
      item.dataset.key = `s${si}c${ci}`;
    });
  });
}

// ── CONSTRUÇÃO ───────────────────────────────────────────────────
function buildNav() {
  document.getElementById('navScroll').innerHTML = modules.map((m, i) =>
    `<button class="nav-pill ${i===0?'active':''}" onclick="goTo(${i})" id="pill-${i}">${m.emoji} ${m.label}</button>`
  ).join('');
}

function buildContent() {
  document.getElementById('mainContent').innerHTML = modules.map((m, i) => `
    <div class="step-page ${i===0?'active':''}" id="page-${i}">
      <div class="mod-eyebrow"><span class="emoji">${m.emoji}</span><span>${m.label}</span><span class="num">${String(i+1).padStart(2,'0')}</span></div>
      <h1 class="mod-title">${m.title}</h1>
      <p class="mod-subtitle">${m.subtitle}</p>
      ${m.content}
    </div>`).join('');
}

// ── UI ───────────────────────────────────────────────────────────
function updateUI() {
  document.querySelectorAll('.step-page').forEach((p,i) => p.classList.toggle('active', i===current));
  document.querySelectorAll('.nav-pill').forEach((p,i) => p.classList.toggle('active', i===current));
  const pill = document.getElementById(`pill-${current}`);
  if (pill) pill.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  document.getElementById('progressFill').style.width = (current/(modules.length-1)*100)+'%';
  document.getElementById('stepCounter').textContent = `${current+1} / ${modules.length}`;
  document.getElementById('btnPrev').disabled = current===0;
  document.getElementById('btnNext').textContent = current===modules.length-1 ? '↩ Início' : 'Próximo →';
  window.scrollTo({top:0, behavior:'smooth'});
}

function navigate(dir) {
  if (dir===1 && current===modules.length-1) { current=0; }
  else { current = Math.max(0, Math.min(modules.length-1, current+dir)); }
  updateUI();
}

function goTo(i) { current=i; updateUI(); }

function toggleCheck(el) {
  el.classList.toggle('done');
  saveState();
}

function resetAll() {
  if (!confirm('Resetar todos os checklists?')) return;
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('done'));
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
  current = 0;
  updateUI();
}

// ── SWIPE ────────────────────────────────────────────────────────
let _sx = 0, _sy = 0, _swipeOk = false;
document.addEventListener('touchstart', e => {
  _swipeOk = !e.target.closest('[data-no-swipe], .table-wrap');
  _sx = e.changedTouches[0].screenX;
  _sy = e.changedTouches[0].screenY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!_swipeOk) return;
  const dx = e.changedTouches[0].screenX - _sx;
  const dy = e.changedTouches[0].screenY - _sy;
  if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.8) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

// ── TECLADO ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') navigate(1);
  if (e.key==='ArrowLeft') navigate(-1);
});

// ── INIT ─────────────────────────────────────────────────────────
buildNav();
buildContent();
assignKeys();
restoreState();
updateUI();
</script>
</body>
</html>
