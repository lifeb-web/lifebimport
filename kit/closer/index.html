<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life B · Closer Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple:   #564B99;
    --purple2:  #4A3F83;
    --magenta:  #DA2F8A;
    --green:    #22c55e;
    --dark:     #100f1c;
    --dark2:    #18162a;
    --dark3:    #201d34;
    --card:     #1c1930;
    --card2:    #221f38;
    --light:    #f0eeff;
    --muted:    #8e89b0;
    --border:   rgba(86,75,153,0.22);
    --grad:     linear-gradient(135deg, #564B99 0%, #DA2F8A 100%);
    --font:     'Plus Jakarta Sans', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--light);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(16,15,28,0.95);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .header-logo svg { height: 27px; width: auto; display: block; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .kit-label {
    font-size: 0.66rem; font-weight: 800; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px;
  }
  .reset-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); transition: all 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .reset-btn:hover { border-color: var(--magenta); color: var(--magenta); }

  /* ── NAV PILLS ── */
  .nav-wrap { background: var(--dark2); border-bottom: 1px solid var(--border); }
  .nav-scroll {
    display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none;
    padding: 10px 16px; -webkit-overflow-scrolling: touch;
  }
  .nav-scroll::-webkit-scrollbar { display: none; }
  .nav-pill {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 13px; border-radius: 8px; font-size: 0.74rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; font-family: var(--font);
    transition: all 0.18s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-pill.active { background: var(--grad); border-color: transparent; color: white; font-weight: 800; }
  .nav-pill:hover:not(.active) { border-color: rgba(86,75,153,0.5); color: var(--light); }

  /* ── PROGRESS BAR ── */
  .progress-bar { height: 3px; background: var(--dark3); }
  .progress-fill {
    height: 100%; background: var(--grad); transition: width 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px rgba(218,47,138,0.5);
  }

  /* ── MAIN ── */
  main { max-width: 720px; margin: 0 auto; padding: 26px 18px 130px; }

  /* ── STEP HEADER ── */
  .badge-row { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; flex-wrap: wrap; }
  .step-badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--dark3); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 11px;
    font-size: 0.69rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .step-badge .num { color: var(--magenta); font-size: 0.76rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .step-progress {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.68rem; font-weight: 800; color: var(--green);
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.22);
    padding: 3px 9px; border-radius: 20px; transition: all 0.25s; letter-spacing: 0.02em;
  }
  .step-progress.complete { background: rgba(34,197,94,0.18); border-color: rgba(34,197,94,0.35); }
  .step-progress.hidden { display: none; }
  .step-title {
    font-size: 1.9rem; font-weight: 800; line-height: 1.06;
    letter-spacing: -0.028em; margin-bottom: 8px;
  }
  .step-subtitle { color: var(--muted); font-size: 0.88rem; line-height: 1.65; font-weight: 400; }

  /* ── OBJECTIVE CARD ── */
  .obj-card {
    background: linear-gradient(135deg, rgba(86,75,153,0.15) 0%, rgba(218,47,138,0.06) 100%);
    border: 1px solid rgba(86,75,153,0.28);
    border-left: 3px solid var(--purple);
    border-radius: 10px; padding: 14px 16px; margin: 20px 0 26px;
  }
  .obj-label { font-size: 0.63rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--magenta); margin-bottom: 7px; }
  .obj-text { font-size: 0.9rem; line-height: 1.72; color: #cac6f0; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.65rem; font-weight: 800; letter-spacing: 0.13em;
    text-transform: uppercase; color: var(--purple);
    margin: 26px 0 11px; display: flex; align-items: center; gap: 10px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── CHECKLIST ── */
  .checklist { display: flex; flex-direction: column; gap: 6px; }
  .check-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 14px; cursor: pointer;
    transition: border-color 0.18s, background 0.18s, opacity 0.22s;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .check-item:hover { border-color: rgba(86,75,153,0.45); background: var(--card2); }
  .check-item:active { transform: scale(0.99); }
  .check-item.done { border-color: rgba(34,197,94,0.28); background: rgba(34,197,94,0.03); opacity: 0.68; }
  .check-box {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid rgba(86,75,153,0.4);
    border-radius: 6px; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; margin-top: 1px;
  }
  .check-item.done .check-box { background: var(--green); border-color: var(--green); }
  .check-item.done .check-box::after { content: '✓'; color: white; font-size: 0.72rem; font-weight: 900; line-height: 1; }
  .check-text { font-size: 0.875rem; line-height: 1.5; }
  .check-text strong { color: var(--light); font-weight: 700; display: block; margin-bottom: 2px; transition: color 0.18s; }
  .check-item.done .check-text strong { text-decoration: line-through; color: var(--muted); }
  .check-text small { color: var(--muted); font-size: 0.78rem; line-height: 1.45; display: block; }

  /* ── SCRIPT CARD ── */
  .script-card {
    background: rgba(218,47,138,0.05); border: 1px solid rgba(218,47,138,0.16);
    border-left: 3px solid var(--magenta);
    border-radius: 0 10px 10px 0; padding: 14px 16px; margin-bottom: 8px;
  }
  .script-label { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.13em; text-transform: uppercase; color: var(--magenta); margin-bottom: 8px; }
  .script-text { font-size: 0.9rem; line-height: 1.75; color: #d4d0f2; font-style: italic; }

  /* ── WARN CARD ── */
  .warn-card {
    background: rgba(218,47,138,0.06); border: 1px solid rgba(218,47,138,0.18);
    border-left: 3px solid rgba(218,47,138,0.6);
    border-radius: 0 9px 9px 0; padding: 12px 16px; margin-bottom: 8px;
    font-size: 0.85rem; color: #f0b8d4; line-height: 1.65;
  }
  .warn-card strong { color: #f472b6; font-weight: 700; }

  /* ── INFO CARD ── */
  .info-card {
    background: rgba(86,75,153,0.08); border: 1px solid rgba(86,75,153,0.18);
    border-radius: 9px; padding: 12px 16px; margin-bottom: 7px;
    font-size: 0.85rem; color: #c4c0ec; line-height: 1.65;
  }
  .info-card strong { color: #b8b3f0; font-weight: 700; }

  /* ── RULE CARD ── */
  .rule-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; gap: 14px; align-items: flex-start;
  }
  .rule-icon { font-size: 1.25rem; flex-shrink: 0; line-height: 1.2; margin-top: 1px; }
  .rule-title { font-weight: 700; font-size: 0.93rem; margin-bottom: 5px; color: var(--light); }
  .rule-text { font-size: 0.83rem; color: var(--muted); line-height: 1.65; }

  /* ── CASE CARD ── */
  .case-card {
    background: linear-gradient(135deg, rgba(86,75,153,0.1) 0%, rgba(218,47,138,0.04) 100%);
    border: 1px solid rgba(86,75,153,0.25);
    border-radius: 11px; padding: 16px; margin-bottom: 9px;
  }
  .case-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; gap: 10px; }
  .case-name { font-weight: 700; font-size: 0.95rem; }
  .case-badge { background: var(--grad); color: white; font-size: 0.76rem; font-weight: 800; padding: 4px 12px; border-radius: 7px; white-space: nowrap; }
  .case-nums { display: flex; gap: 20px; margin-bottom: 9px; flex-wrap: wrap; }
  .case-num { font-size: 0.8rem; color: var(--muted); }
  .case-num strong { color: var(--light); font-weight: 700; }
  .case-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.58; }

  /* ── COMBO TABLE ── */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .combo-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .combo-table th {
    background: var(--dark3); color: var(--muted); font-size: 0.63rem;
    letter-spacing: 0.11em; text-transform: uppercase; padding: 9px 12px;
    text-align: left; border-bottom: 1px solid var(--border); font-weight: 700;
  }
  .combo-table td { padding: 10px 12px; border-bottom: 1px solid rgba(86,75,153,0.08); vertical-align: middle; }
  .combo-table tr:last-child td { border-bottom: none; }
  .combo-table tbody tr:hover td { background: rgba(86,75,153,0.07); }
  .combo-table tr.rec-row td { background: rgba(86,75,153,0.1); }
  .combo-table tr.rec-row td:first-child { border-left: 2px solid var(--purple); padding-left: 10px; }
  .combo-name { font-weight: 600; color: var(--light); }
  .combo-price { color: #9be8a0; font-weight: 700; }
  .combo-parcel { color: var(--muted); font-size: 0.77rem; }
  .combo-tag { background: rgba(86,75,153,0.2); border: 1px solid rgba(86,75,153,0.3); color: #b8b3f0; font-size: 0.63rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .combo-tag.entry { background: rgba(218,47,138,0.1); border-color: rgba(218,47,138,0.25); color: #f0b8d4; }
  .combo-tag.rec { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); color: #86efac; }
  .combo-promo { font-size: 0.71rem; color: var(--muted); padding: 9px 12px 11px; border-top: 1px solid var(--border); line-height: 1.55; }

  /* ── FLAG ITEM ── */
  .flag-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(218,47,138,0.04); border: 1px solid rgba(218,47,138,0.15);
    border-left: 3px solid rgba(218,47,138,0.45);
    border-radius: 0 9px 9px 0; padding: 11px 14px; margin-bottom: 7px;
    font-size: 0.85rem; line-height: 1.58; color: #f0b8d4;
  }
  .flag-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 2px; }

  /* ── STEP PAGES ── */
  .step-page { display: none; }
  .step-page.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(9px); } to { opacity: 1; transform: translateY(0); } }

  /* ── BOTTOM NAV ── */
  .nav-buttons {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(16,15,28,0.97); backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px); border-top: 1px solid var(--border);
    padding: 12px 18px; display: flex; justify-content: space-between;
    align-items: center; gap: 10px; z-index: 100;
  }
  .nav-btn {
    background: var(--dark3); border: 1px solid var(--border); color: var(--light);
    padding: 13px 18px; border-radius: 10px; font-size: 0.88rem; font-weight: 700;
    cursor: pointer; font-family: var(--font); transition: all 0.18s; flex: 1;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--purple); background: var(--card2); }
  .nav-btn:active:not(:disabled) { transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
  .nav-btn.primary { background: var(--grad); border-color: transparent; color: white; }
  .nav-btn.primary:hover:not(:disabled) { opacity: 0.88; }
  .step-counter { font-size: 0.72rem; color: var(--muted); text-align: center; flex-shrink: 0; font-weight: 700; white-space: nowrap; line-height: 1.4; }

  /* ── DESKTOP ── */
  @media (min-width: 640px) {
    main { padding: 32px 28px 140px; }
    .step-title { font-size: 2.2rem; }
    .step-subtitle { font-size: 0.93rem; }
    .check-text { font-size: 0.9rem; }
    .script-text { font-size: 0.92rem; }
    .nav-buttons { padding: 14px 24px; }
    .nav-btn { padding: 14px 24px; font-size: 0.9rem; }
  }
</style>
</head>

let current = 0;
const STORAGE_KEY = 'lifeb-closer-kit';

// ── PERSITÊNCIA ──────────────────────────────────────────────────
function saveState() {
  const state = {};
  document.querySelectorAll('.check-item[data-key]').forEach(el => {
    state[el.dataset.key] = el.classList.contains('done') ? 1 : 0;
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
}

function restoreState() {
  let state = {};
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(_) {}
  document.querySelectorAll('.check-item[data-key]').forEach(el => {
    if (state[el.dataset.key]) el.classList.add('done');
  });
}

function assignKeys() {
  document.querySelectorAll('.step-page').forEach((page, si) => {
    page.querySelectorAll('.check-item').forEach((item, ci) => {
      item.dataset.key = `s${si}c${ci}`;
    });
  });
}

// ── CONSTRUÇÃO ───────────────────────────────────────────────────
function buildNav() {
  document.getElementById('navScroll').innerHTML = steps.map((s, i) =>
    `<button class="nav-pill${i===0?' active':''}" onclick="goTo(${i})" id="pill-${i}">${s.emoji} ${s.label}</button>`
  ).join('');
}

function buildContent() {
  document.getElementById('mainContent').innerHTML = steps.map((s, i) => `
    <div class="step-page${i===0?' active':''}" id="page-${i}">
      <div class="badge-row">
        <div class="step-badge"><span>${s.emoji}</span><span>${s.label}</span><span class="num">${String(i+1).padStart(2,'0')}</span></div>
        <span class="step-progress hidden" id="prog-${i}"></span>
      </div>
      <h1 class="step-title">${s.title}</h1>
      <p class="step-subtitle">${s.subtitle}</p>
      ${s.objective ? `<div class="obj-card"><div class="obj-label">Objetivo da etapa</div><div class="obj-text">${s.objective}</div></div>` : ''}
      ${s.content}
    </div>`).join('');
}

// ── PROGRESSO ────────────────────────────────────────────────────
function updateProgress() {
  steps.forEach((_, i) => {
    const page = document.getElementById(`page-${i}`);
    if (!page) return;
    const all  = page.querySelectorAll('.check-item');
    const done = page.querySelectorAll('.check-item.done');
    const el   = document.getElementById(`prog-${i}`);
    if (!el) return;
    if (all.length === 0) { el.classList.add('hidden'); return; }
    el.classList.remove('hidden');
    if (done.length === all.length) {
      el.textContent = '✓ Completo';
      el.classList.add('complete');
    } else {
      el.textContent = `${done.length} / ${all.length}`;
      el.classList.remove('complete');
    }
  });
}

// ── UI ───────────────────────────────────────────────────────────
function updateUI() {
  document.querySelectorAll('.step-page').forEach((p, i) => p.classList.toggle('active', i === current));
  document.querySelectorAll('.nav-pill').forEach((p, i) => p.classList.toggle('active', i === current));
  const pill = document.getElementById(`pill-${current}`);
  if (pill) pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  document.getElementById('progressFill').style.width = (current / (steps.length - 1) * 100) + '%';
  document.getElementById('stepCounter').textContent = `${current + 1} / ${steps.length}`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').textContent = current === steps.length - 1 ? '↩ Início' : 'Próximo →';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgress();
}

function navigate(dir) {
  if (dir === 1 && current === steps.length - 1) { current = 0; }
  else { current = Math.max(0, Math.min(steps.length - 1, current + dir)); }
  updateUI();
}
function goTo(i) { current = i; updateUI(); }

function toggleCheck(el) {
  el.classList.toggle('done');
  saveState();
  updateProgress();
}

function resetAll() {
  if (!confirm('Resetar todos os checklists?')) return;
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('done'));
  try { localStorage.removeItem(STORAGE_KEY); } catch(_) {}
  current = 0;
  updateUI();
}

// ── SWIPE ────────────────────────────────────────────────────────
let _sx = 0, _sy = 0, _swipeOk = false;
document.addEventListener('touchstart', e => {
  _swipeOk = !e.target.closest('[data-no-swipe], .table-wrap');
  _sx = e.changedTouches[0].screenX;
  _sy = e.changedTouches[0].screenY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!_swipeOk) return;
  const dx = e.changedTouches[0].screenX - _sx;
  const dy = e.changedTouches[0].screenY - _sy;
  if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.8) navigate(dx < 0 ? 1 : -1);
}, { passive: true });

// ── TECLADO ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
});

// ── INIT ─────────────────────────────────────────────────────────
buildNav();
buildContent();
assignKeys();
restoreState();
updateUI();
</script>
